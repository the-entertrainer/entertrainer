<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertrainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>document.documentElement.classList.add('js');</script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: 'Space Mono', monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 520px;
    }

    .bar {
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 28px;
      height: 100px;
      width: 100%;
      cursor: pointer;
      transition: background 0.15s ease;
      will-change: transform;
      transform-origin: 50% 50%;
      overflow: hidden;
    }

    /* Hidden until GSAP positions it (JS only) */
    .js .bar { opacity: 0; }

    .bar:hover {
      background: #1a1a1a;
    }

    .bar:hover .icon svg {
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
    }

    /* The racing dash stream that lives on top of the bar during the run phase */
    .bar__stream {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, #000 0 16px, #fff 16px 30px);
      background-size: 30px 100%;
      animation: run 0.45s linear infinite;
      pointer-events: none;
    }

    @keyframes run {
      to { background-position-x: 30px; }
    }

    .icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      transition: filter 0.15s ease;
    }

    .bar__label {
      position: relative;
      z-index: 2;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      body { padding: 48px; }
      .logo { max-width: 300px; gap: 10px; }
      .bar { height: 64px; padding: 0 18px; gap: 14px; }
      .icon { width: 26px; height: 26px; }
      .bar__label { font-size: 13px; letter-spacing: 0.1em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .js .bar { opacity: 1; transform: none !important; }
      .bar__stream { display: none; }
    }
  </style>
</head>
<body>
  <div class="logo">

    <div class="bar">
      <div class="bar__stream"></div>
      <div class="icon">
        <svg viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter">
          <polyline points="2,16 16,4 30,16"/>
          <polyline points="6,14 6,28 13,28 13,20 19,20 19,28 26,28 26,14"/>
        </svg>
      </div>
      <span class="bar__label">Home</span>
    </div>

    <div class="bar">
      <div class="bar__stream"></div>
      <div class="icon">
        <svg viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter">
          <rect x="9" y="9" width="14" height="14"/>
          <line x1="9" y1="12" x2="4" y2="12"/>
          <line x1="9" y1="16" x2="4" y2="16"/>
          <line x1="9" y1="20" x2="4" y2="20"/>
          <line x1="23" y1="12" x2="28" y2="12"/>
          <line x1="23" y1="16" x2="28" y2="16"/>
          <line x1="23" y1="20" x2="28" y2="20"/>
          <line x1="12" y1="9" x2="12" y2="4"/>
          <line x1="16" y1="9" x2="16" y2="4"/>
          <line x1="20" y1="9" x2="20" y2="4"/>
          <line x1="12" y1="23" x2="12" y2="28"/>
          <line x1="16" y1="23" x2="16" y2="28"/>
          <line x1="20" y1="23" x2="20" y2="28"/>
        </svg>
      </div>
      <span class="bar__label">Tools</span>
    </div>

    <div class="bar">
      <div class="bar__stream"></div>
      <div class="icon">
        <svg viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter">
          <line x1="16" y1="4" x2="16" y2="20"/>
          <polyline points="9,14 16,21 23,14"/>
          <polyline points="4,24 4,28 28,28 28,24"/>
        </svg>
      </div>
      <span class="bar__label">Downloads</span>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    (function () {
      var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var bars = Array.prototype.slice.call(document.querySelectorAll('.bar'));

      // Graceful fallback: just show the final bars
      if (typeof gsap === 'undefined' || reduce) {
        bars.forEach(function (b) {
          b.style.opacity = 1;
          var s = b.querySelector('.bar__stream');
          if (s) s.style.display = 'none';
        });
        return;
      }

      // How far each bar must stretch to bleed past the viewport edges
      function vwRatio(bar) {
        var w = bar.getBoundingClientRect().width || 1;
        return (window.innerWidth / w) * 1.15;
      }

      var tl = gsap.timeline({ defaults: { ease: 'power3.inOut' }, delay: 0.25 });

      bars.forEach(function (bar, i) {
        var stream = bar.querySelector('.bar__stream');
        var icon = bar.querySelector('.icon');
        var label = bar.querySelector('.bar__label');
        var at = i * 0.14;

        // Start state: full-bleed thin line, content + solid fill hidden behind stream
        gsap.set(bar, { opacity: 1, scaleX: vwRatio(bar), scaleY: 0.022 });
        gsap.set([icon, label], { opacity: 0, x: -14 });
        gsap.set(stream, { opacity: 1 });

        // Run phase holds (CSS loop plays), then retract width in
        tl.to(bar, { scaleX: 1, duration: 0.95, ease: 'power3.inOut' }, 0.6 + at)
          // Bloom thickness into the solid bar
          .to(bar, { scaleY: 1, duration: 0.7, ease: 'power4.out' }, 1.15 + at)
          // Crossfade the racing stream away to reveal solid black
          .to(stream, { opacity: 0, duration: 0.5, ease: 'power2.out' }, 1.25 + at)
          // Settle the icon + label
          .to([icon, label], { opacity: 1, x: 0, duration: 0.55, stagger: 0.07, ease: 'power2.out' }, 1.55 + at);
      });
    })();
  </script>
</body>
</html>
