<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertrainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: 'Space Mono', monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 520px;
    }

    .bar {
      background: #000;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 28px;
      height: 100px;
      width: 100%;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .bar:hover {
      background: #1a1a1a;
    }

    .bar:hover .icon svg {
      stroke: #fff;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
    }

    .icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      transition: filter 0.15s ease;
    }

    .bar__label {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      body {
        padding: 48px;
      }

      .logo {
        max-width: 300px;
        gap: 10px;
      }

      .bar {
        height: 64px;
        padding: 0 18px;
        gap: 14px;
      }

      .icon {
        width: 26px;
        height: 26px;
      }

      .bar__label {
        font-size: 13px;
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>
<body>
  <div class="logo">

    <div class="bar">
      <div class="icon">
        <!-- Home: angular terminal house -->
        <svg viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter">
          <polyline points="2,16 16,4 30,16"/>
          <polyline points="6,14 6,28 13,28 13,20 19,20 19,28 26,28 26,14"/>
        </svg>
      </div>
      <span class="bar__label">Home</span>
    </div>

    <div class="bar">
      <div class="icon">
        <!-- Tools: CPU chip with pins -->
        <svg viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter">
          <rect x="9" y="9" width="14" height="14"/>
          <line x1="9" y1="12" x2="4" y2="12"/>
          <line x1="9" y1="16" x2="4" y2="16"/>
          <line x1="9" y1="20" x2="4" y2="20"/>
          <line x1="23" y1="12" x2="28" y2="12"/>
          <line x1="23" y1="16" x2="28" y2="16"/>
          <line x1="23" y1="20" x2="28" y2="20"/>
          <line x1="12" y1="9" x2="12" y2="4"/>
          <line x1="16" y1="9" x2="16" y2="4"/>
          <line x1="20" y1="9" x2="20" y2="4"/>
          <line x1="12" y1="23" x2="12" y2="28"/>
          <line x1="16" y1="23" x2="16" y2="28"/>
          <line x1="20" y1="23" x2="20" y2="28"/>
        </svg>
      </div>
      <span class="bar__label">Tools</span>
    </div>

    <div class="bar">
      <div class="icon">
        <!-- Downloads: angular arrow into tray -->
        <svg viewBox="0 0 32 32" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter">
          <line x1="16" y1="4" x2="16" y2="20"/>
          <polyline points="9,14 16,21 23,14"/>
          <polyline points="4,24 4,28 28,28 28,24"/>
        </svg>
      </div>
      <span class="bar__label">Downloads</span>
    </div>

  </div>
</body>
</html>
