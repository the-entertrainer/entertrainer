<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertrainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Space Mono', monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 520px;
    }

    .bar {
      background: #000000;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 28px;
      height: 100px;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .bar:hover {
      background: #111111;
    }

    .bar lord-icon {
      flex-shrink: 0;
    }

    .bar__label {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      body {
        padding: 48px;
      }

      .logo {
        max-width: 320px;
        gap: 10px;
      }

      .bar {
        height: 64px;
        padding: 0 18px;
        gap: 14px;
      }

      .bar__label {
        font-size: 13px;
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="bar">
      <lord-icon
        src="https://cdn.lordicon.com/wmwqvixz.json"
        trigger="hover"
        colors="primary:#ffffff,secondary:#ffffff"
        size="32">
      </lord-icon>
      <span class="bar__label">Home</span>
    </div>

    <div class="bar">
      <lord-icon
        src="https://cdn.lordicon.com/dqxvhztu.json"
        trigger="hover"
        colors="primary:#ffffff,secondary:#ffffff"
        size="32">
      </lord-icon>
      <span class="bar__label">Tools</span>
    </div>

    <div class="bar">
      <lord-icon
        src="https://cdn.lordicon.com/bdxnbber.json"
        trigger="hover"
        colors="primary:#ffffff,secondary:#ffffff"
        size="32">
      </lord-icon>
      <span class="bar__label">Downloads</span>
    </div>
  </div>
</body>
</html>
