<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertrainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Space Mono', monospace;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: min(480px, 85vw);
    }

    .bar {
      background: #000000;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 28px;
      height: 100px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .bar:hover {
      background: #111111;
    }

    .bar--mid {
      width: 75%;
    }

    .bar lord-icon {
      flex-shrink: 0;
    }

    .bar__label {
      color: #ffffff;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .bar {
        height: 80px;
        padding: 0 20px;
        gap: 16px;
      }

      .logo {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="bar">
      <lord-icon
        src="https://cdn.lordicon.com/wmwqvixz.json"
        trigger="hover"
        colors="primary:#ffffff,secondary:#ffffff"
        size="40">
      </lord-icon>
      <span class="bar__label">Home</span>
    </div>

    <div class="bar bar--mid">
      <lord-icon
        src="https://cdn.lordicon.com/dqxvhztu.json"
        trigger="hover"
        colors="primary:#ffffff,secondary:#ffffff"
        size="40">
      </lord-icon>
      <span class="bar__label">Tools</span>
    </div>

    <div class="bar">
      <lord-icon
        src="https://cdn.lordicon.com/bdxnbber.json"
        trigger="hover"
        colors="primary:#ffffff,secondary:#ffffff"
        size="40">
      </lord-icon>
      <span class="bar__label">Downloads</span>
    </div>
  </div>
</body>
</html>
